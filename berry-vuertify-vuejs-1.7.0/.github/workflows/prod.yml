name: Node - Prod deploy

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches:
      - master
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 🔨 Build Project
        run: |
          cd full-version
          npm i
          npm run build-prod

      - name: 📂 Deploy to Server
        uses: easingthemes/ssh-deploy@v4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          # ARGS: "-rltgoDzvO --delete"
          SOURCE: "full-version/dist/"
          REMOTE_HOST: 145.79.3.173
          REMOTE_USER: u965251139
          REMOTE_PORT: "65002"
          TARGET: domains/berrydashboard.com/public_html/vue
          EXCLUDE: "/full-version/node_modules/"
                                              
      - name: Read version
        id: version
        run: echo "VERSION=$(jq -r .version full-version/package.json)" >> $GITHUB_ENV

      - name: 📦 Create version ZIP
        run: |
          zip -r "berry-vue-v${VERSION}.zip" . \
            -x ".git/*" \
            -x ".github/workflows/*" \
            -x ".gitignore" \
            -x ".husky/*" \
            -x ".lintstagedrc" \
            -x ".lintstagedrc.cjs" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "node_modules/*" \
            -x "full-version/node_modules/*" \
            -x "full-version/dist/*" \
            -x "seed/node_modules/*" \
            -x "seed/dist/*"

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: 🚀 Upload ZIP to S3
        run: |
          aws s3 cp "berry-vue-v${VERSION}.zip" \
          "s3://${{ secrets.AWS_S3_BUCKET }}/Berry/Vue/berry-vue-v${VERSION}.zip"
